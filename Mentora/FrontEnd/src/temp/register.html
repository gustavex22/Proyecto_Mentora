<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentora - Registrarse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Register.css">
</head>
<body>

    <div class="geometric-background">
        <div class="triangle tri-1"></div>
        <div class="triangle tri-2"></div>
        <div class="triangle tri-3"></div>
        <div class="triangle tri-4"></div>
        <div class="triangle tri-5"></div>
        <div class="triangle tri-6"></div>
        <div class="triangle tri-7"></div>
        <div class="triangle tri-8"></div>
    </div>  

    <main class="login-wrapper">
        <div class="glass-card">
            
            <h1 class="login-title">Register</h1>

            <form class="login-form" action="#" method="POST">
                
                <div class="input-container">
                    <input type="text" placeholder="First Name" required class="round-input">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </span>
                </div>

                <div class="input-container">
                    <input type="text" placeholder="Last Name" required class="round-input">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </span>
                </div>

                <div class="input-container">
                    <input type="email" placeholder="E-mail" required class="round-input">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    </span>
                </div>

                <div class="input-container">
                    <input type="password" placeholder="Password" required class="round-input">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </span>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" required>
                        <span>I agree to the Terms & Conditions</span>
                    </label>
                </div>

                <button type="submit" class="btn-primary-round">Sign Up</button>
            </form>

            <div class="social-section">
                <p class="social-title">Register With :</p>
                <div class="social-icons">
                    <button class="social-btn-round" aria-label="Google">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M21.35 11.1H12.13v2.92h5.26c-.23 1.47-1.33 3.08-3.26 3.08-1.96 0-3.56-1.61-3.56-3.6s1.6-3.6 3.56-3.6c1.12 0 1.87.48 2.3.9l1.99-1.92C16.9 5.4 15.25 4.7 13 4.7c-4.24 0-7.7 3.47-7.7 7.7s3.46 7.7 7.7 7.7c4.43 0 7.37-3.11 7.37-7.5 0-.5-.05-.92-.12-1.25z" />
                        </svg>
                    </button>
                    <button class="social-btn-round" aria-label="Facebook">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c4.56-.93 8-4.96 8-9.8z"/></svg>
                    </button>
                    <button class="social-btn-round" aria-label="GitHub">
                        <svg width="18" height="18" viewBox="0 0 19 19" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M9.356 1.85C5.05 1.85 1.57 5.356 1.57 9.694a7.84 7.84 0 0 0 5.324 7.44c.387.079.528-.168.528-.376 0-.182-.013-.805-.013-1.454-2.165.467-2.616-.935-2.616-.935-.349-.91-.864-1.143-.864-1.143-.71-.48.051-.48.051-.48.787.051 1.2.805 1.2.805.695 1.194 1.817.857 2.268.649.064-.507.27-.857.49-1.052-1.728-.182-3.545-.857-3.545-3.87 0-.857.31-1.558.8-2.104-.078-.195-.349-1 .077-2.078 0 0 .657-.208 2.14.805a7.5 7.5 0 0 1 1.946-.26c.657 0 1.328.092 1.946.26 1.483-1.013 2.14-.805 2.14-.805.426 1.078.155 1.883.078 2.078.502.546.799 1.247.799 2.104 0 3.013-1.818 3.675-3.558 3.87.284.247.528.714.528 1.454 0 1.052-.012 1.896-.012 2.156 0 .208.142.455.528.377a7.84 7.84 0 0 0 5.324-7.441c.013-4.338-3.48-7.844-7.773-7.844"/></svg>
                    </button>
                </div>
            </div>

            <div class="signup-redirect">
                Already Have an Account? <a href="login.html">Login Here!</a>
            </div>

        </div>
    </main>

</body>
</html>
